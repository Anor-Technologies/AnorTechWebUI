# On every AnorTechWebUI tag push, notify all child sites so they bump
# immediately instead of waiting for their daily cron.
#
# Requires a repo secret ANOR_DISPATCH_TOKEN: a PAT that can call the
# repository_dispatch API on the child repos (classic PAT with `repo` scope,
# or fine-grained PAT with Contents read/write on each child repo).
# Add it under Settings → Secrets and variables → Actions.
name: release-dispatch

on:
  push:
    tags: ["v*"]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - Anor-Technologies/www.anor-tech.com
          - Anor-Technologies/njlcs.com
    steps:
      - name: Dispatch theme-release to ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.ANOR_DISPATCH_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ matrix.repo }}/dispatches" \
            -d '{"event_type":"theme-release","client_payload":{"version":"${{ github.ref_name }}"}}'
