# Theme-level configuration merged into every child site.
[module]
  [module.hugoVersion]
    extended = true
    min = '0.146.0'

[outputFormats]
  [outputFormats.llms]
    name = 'llms'
    baseName = 'llms'
    mediaType = 'text/plain'
    isPlainText = true
  [outputFormats.markdown]
    name = 'markdown'
    baseName = 'index'
    mediaType = 'text/markdown'
    isPlainText = true
    ugly = true

enableInlineShortcodes = true

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [['\[', '\]'], ['$$', '$$']]
      inline = [['\(', '\)']]
