{{ define "main" }}
  {{ partial "custom/page-begin.html" . }}
  <div class="anor">
    <header class="an-pagehead">
      <div class="an-container">
        {{ with .Params.kicker }}<p class="an-eyebrow an-reveal">{{ . }}</p>{{ end }}
        <h1 class="an-h1 an-reveal d-1">{{ .Title }}</h1>
        {{ with .Params.description }}<p class="an-lead an-reveal d-2">{{ . }}</p>{{ end }}
      </div>
    </header>
    <div class="an-container">
      <article class="an-prose">
        {{ .Content }}
      </article>
    </div>
  </div>
  {{ partial "custom/page-end.html" . }}
  {{ partial "custom/anor-motion.html" . }}
{{ end }}
